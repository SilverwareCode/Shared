    <!-- Bootstrap CSS -->

<body>

    <div id="carouselComponent">
        <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
            <ol class="carousel-indicators">
                <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
            </ol>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div id="slide1" style="background-color: red; width: 100%; height: 400px;">

                    </div>
                </div>
                <div class="carousel-item">
                    <div id="slide2" style="background-color: green; width: 100%; height: 400px;">

                    </div>
                </div>
                <div class="carousel-item">
                    <div id="slide3" style="background-color: yellow; width: 100%; height: 400px;">

                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-target="#carouselExampleIndicators" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-target="#carouselExampleIndicators" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </button>
        </div>
    </div>

    <!--<script>
        getRemoteContent('carouselComponent', 'https://raw.githubusercontent.com/SilverwareCode/Shared/refs/heads/main/OCI/WebComponents/CarouselComponent.html?v=1');
    </script>-->

    
    <script>
        function onDomContentLoaded() {
            getRemoteContent('carouselComponent', 'https://raw.githubusercontent.com/SilverwareCode/Shared/refs/heads/main/OCI/WebComponents/CarouselComponent.html?v=1');
            //alert ('DOM content loaded');
            getRemoteContent('slide1', 'https://raw.githubusercontent.com/SilverwareCode/Shared/refs/heads/main/OCI/Marketing/MarketingPackages/TestPackage/index.html');
            getRemoteContent('slide2', 'https://raw.githubusercontent.com/SilverwareCode/Shared/refs/heads/main/OCI/Marketing/MarketingPackages/TestPackage/index.html');
            getRemoteContent('slide3', 'https://raw.githubusercontent.com/SilverwareCode/Shared/refs/heads/main/OCI/Marketing/MarketingPackages/TestPackage/index.html');

            
        }

        document.addEventListener('DOMContentLoaded', onDomContentLoaded);
    </script>
